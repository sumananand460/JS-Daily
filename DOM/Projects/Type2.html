<!--Search & Filter-->

<!DOCTYPE html>
<html>
<head>
  <title>Search & Filter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    
    .search-box { margin-bottom: 30px; }
    .search-box input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 5px; }
    
    .filter-buttons { margin-bottom: 20px; }
    button { padding: 8px 15px; margin-right: 10px; border: none; background: #ddd; cursor: pointer; border-radius: 3px; }
    button.active { background: #4CAF50; color: white; }
    
    .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .card { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card h3 { margin-bottom: 10px; }
    .card .category { background: #4CAF50; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; margin-bottom: 10px; }
    .card p { color: #666; margin-bottom: 10px; }
    .card .price { font-weight: bold; color: #4CAF50; font-size: 18px; }
    
    .no-results { text-align: center; padding: 40px; color: #999; }
    .highlight { background: #ffeb3b; padding: 2px 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Product Search</h1>
    
    <div class="search-box">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search products..."
      >
    </div>

    <div class="filter-buttons">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="electronics">Electronics</button>
      <button class="filter-btn" data-category="clothing">Clothing</button>
      <button class="filter-btn" data-category="books">Books</button>
    </div>

    <div class="results" id="results"></div>
    <div class="no-results" id="noResults" style="display: none;">
      No products found
    </div>
  </div>

  <script>
    const products = [
      { name: 'Laptop', category: 'electronics', price: 999, description: 'Powerful laptop' },
      { name: 'Phone', category: 'electronics', price: 699, description: 'Latest smartphone' },
      { name: 'T-Shirt', category: 'clothing', price: 29, description: 'Cotton t-shirt' },
      { name: 'Jeans', category: 'clothing', price: 79, description: 'Blue denim jeans' },
      { name: 'JavaScript Book', category: 'books', price: 35, description: 'Learn JavaScript' },
      { name: 'CSS Guide', category: 'books', price: 30, description: 'CSS mastery' },
      { name: 'Headphones', category: 'electronics', price: 199, description: 'Wireless headphones' },
      { name: 'Shoes', category: 'clothing', price: 89, description: 'Sports shoes' },
    ];

    const searchInput = document.querySelector('#searchInput');
    const resultsDiv = document.querySelector('#results');
    const noResults = document.querySelector('#noResults');
    const filterButtons = document.querySelectorAll('.filter-btn');

    let currentCategory = 'all';

    // Filter button clicks
    filterButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        // Update active button
        filterButtons.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');

        currentCategory = e.target.getAttribute('data-category');
        filter();
      });
    });

    // Search input
    searchInput.addEventListener('input', filter);

    function filter() {
      const searchTerm = searchInput.value.toLowerCase();

      const filtered = products.filter(product => {
        const matchesSearch = product.name.toLowerCase().includes(searchTerm) ||
                             product.description.toLowerCase().includes(searchTerm);
        const matchesCategory = currentCategory === 'all' || product.category === currentCategory;
        return matchesSearch && matchesCategory;
      });

      displayResults(filtered, searchTerm);
    }

    function displayResults(filtered, searchTerm) {
      resultsDiv.innerHTML = '';

      if (filtered.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';

      filtered.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';

        // Highlight search term
        let name = product.name;
        let desc = product.description;
        if (searchTerm) {
          const regex = new RegExp(`(${searchTerm})`, 'gi');
          name = name.replace(regex, '<span class="highlight">$1</span>');
          desc = desc.replace(regex, '<span class="highlight">$1</span>');
        }

        card.innerHTML = `
          <span class="category">${product.category}</span>
          <h3>${name}</h3>
          <p>${desc}</p>
          <div class="price">$${product.price}</div>
        `;

        resultsDiv.appendChild(card);
      });
    }

    // Initial display
    filter();
  </script>
</body>
</html>
